<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portofilio</title>
        <!-- bootstrap -->
        <link rel="stylesheet" href="css/all.min.css" />
        <link rel="stylesheet" href="css/bootstrap.min.css" />

        <link rel="stylesheet" href="css/animate.css" />

        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body class="vector start-soon">
        <div class="line"></div>
        <div>
            <div class="bg-comming-soon">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-2 col-12"></div>
                        <div class="col-lg-8 col-12">
                            <div class="d-flex justify-content-center">
                                <img src="image/logo.png" alt="Coming Soon"
                                    style="height: 100px;" />
                            </div>
                            <div class="main-title">
                                <h1 class="color-red text-center mt-4">
                                     سنبدأ قريبـــــــاً
                                </h1>
                                <h3 class="text-center text-white">
                                    It starts soon
                                </h3>
                                <p class="text-center text-white mt-5">
                                    Be the first to hear about what’s happening next, join our newsletter to stay up to date.
                                </p>
                                <form class="row g-3" style="margin-top: 30px;">
                                    <div class="col-md-3 col-12"></div>
                                    <div class="col-md-6 col-12">
                                        <input type="email" class="form-control"
                                            id="validationDefault03"
                                            value="Email address" required style="border: none; background-color: #FFFFFF80; color: white; border-radius: 5px;">
                                    </div>
                                    <div class="col-md-3 col-12"></div>
                                    <div class="col-md-3 col-12"></div>
                                    <div class="col-md-6 col-12">

                                        <button class="custom-btn w-100"
                                            type="submit">
                                            <span>JOIN NOW</span>
                                        </button>
                                    </div>
                                    <div class="col-md-3 col-12"></div>
                                </form>
                            </div>
                        </div>
                        <div class="col-lg-2 col-12"></div>
                    </div>
                </div>
            </div>
        </div>

    </body>
